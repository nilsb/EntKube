# docker-compose.yml — single-node dev/debug
#
# Runs the Go backend (with HA support enabled) and Postgres.
# The frontend dev server is intentionally separate:
#   cd frontend && npm run dev     ← hot-reload on :5173, proxies /api → :8080
#
# Usage:
#   cp .env.example .env && docker compose up --build

services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       entkube
      POSTGRES_USER:     entkube
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entkube -d entkube"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"     # expose for local psql / migration tools

  entkube:
    build:
      context: .        # root of the repo — picks up Dockerfile
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:       "postgres://entkube:${POSTGRES_PASSWORD:-changeme}@postgres:5432/entkube?sslmode=disable"
      VAULT_ROOT_KEY:     "${VAULT_ROOT_KEY}"
      JWT_SECRET:         "${JWT_SECRET}"
      NODE_ADDRESS:       "http://entkube:8080"
      NODE_KEY_FILE:      "/data/node_key.pem"
      PORT:               "8080"
      HA_JOIN_TOKEN:      "${HA_JOIN_TOKEN}"
      ADMIN_EMAIL:        "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD:     "${ADMIN_PASSWORD:-}"
      WEBHOOK_GIT_SECRET: "${WEBHOOK_GIT_SECRET:-}"
    volumes:
      - entkube-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:
  entkube-data:
