version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema:  "internal/db/migrations"
    gen:
      go:
        package:      "dbq"
        out:          "internal/db/dbq"
        emit_json_tags:         true
        emit_db_tags:           true
        emit_prepared_queries:  false
        emit_interface:         true
        emit_exact_table_names: false
        emit_empty_slices:      true
        sql_package:            "pgx/v5"
